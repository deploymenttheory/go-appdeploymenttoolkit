<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PSAppDeployToolkit</title>
<style>
  :root { --accent: #0078d4; --bg:#f3f3f3; --card:#fff; --fg:#1b1b1b; --fg-dim:#5f5f5f; --track:#e2e2e2; }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#202020; --card:#2b2b2b; --fg:#f5f5f5; --fg-dim:#b8b8b8; --track:#3a3a3a; }
  }
  * { box-sizing: border-box; }
  html, body { margin:0; height:100%; font-family:"Segoe UI Variable","Segoe UI",system-ui,sans-serif;
    background:var(--bg); color:var(--fg); font-size:14px; }
  #wrap { display:flex; flex-direction:column; justify-content:center; min-height:100vh; padding:24px; }
  .sub { font-size:12px; color:var(--fg-dim); margin-bottom:4px; }
  .msg { font-size:16px; font-weight:600; margin-bottom:6px; }
  .detail { font-size:13px; color:var(--fg-dim); margin-bottom:16px; white-space:pre-wrap; }
  .bar { height:6px; border-radius:3px; background:var(--track); overflow:hidden; position:relative; }
  .fill { height:100%; background:var(--accent); width:0%; transition:width .25s ease; }
  .bar.indeterminate .fill {
    width:35%; position:absolute; animation:march 1.3s infinite ease-in-out;
  }
  @keyframes march { 0%{left:-35%} 100%{left:100%} }
</style>
</head>
<body>
<div id="wrap">
  <div class="sub" id="subtitle"></div>
  <div class="msg" id="message"></div>
  <div class="detail" id="detail"></div>
  <div class="bar" id="bar"><div class="fill" id="fill"></div></div>
</div>
<script>
(function () {
  "use strict";
  function $(id){ return document.getElementById(id); }
  function apply(v){
    v = v || {};
    if (v.accentColor) document.documentElement.style.setProperty("--accent", v.accentColor);
    $("subtitle").textContent = v.subtitle || "";
    $("message").textContent = v.message || "";
    $("detail").textContent = v.detail || "";
    var bar = $("bar"), fill = $("fill");
    if (v.percent === null || typeof v.percent === "undefined") {
      bar.classList.add("indeterminate");
      fill.style.width = "35%";
    } else {
      bar.classList.remove("indeterminate");
      fill.style.width = Math.max(0, Math.min(100, v.percent)) + "%";
    }
  }
  // Go pushes updates into the live window through this hook.
  window.__setProgress = function (json) {
    try { apply(typeof json === "string" ? JSON.parse(json) : json); }
    catch (e) { /* ignore malformed update */ }
  };
  document.addEventListener("DOMContentLoaded", function () { apply(window.__PROGRESS__); });
})();
</script>
</body>
</html>
