<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PSAppDeployToolkit</title>
<style>
  :root {
    --accent: #0078d4;
    --bg: #f3f3f3;
    --card: #ffffff;
    --fg: #1b1b1b;
    --fg-dim: #5f5f5f;
    --border: #e2e2e2;
    --row: #fafafa;
    --row-alt: #f0f0f0;
    --btn-secondary-bg: #ffffff;
    --btn-secondary-fg: #1b1b1b;
    --btn-secondary-border: #c8c8c8;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #202020;
      --card: #2b2b2b;
      --fg: #f5f5f5;
      --fg-dim: #b8b8b8;
      --border: #3a3a3a;
      --row: #333333;
      --row-alt: #2b2b2b;
      --btn-secondary-bg: #3a3a3a;
      --btn-secondary-fg: #f5f5f5;
      --btn-secondary-border: #4a4a4a;
    }
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: "Segoe UI Variable", "Segoe UI", system-ui, sans-serif;
    background: var(--bg); color: var(--fg);
    font-size: 14px;
  }
  #app { display: flex; flex-direction: column; min-height: 100vh; }
  #banner { width: 100%; max-height: 84px; object-fit: cover; display: none; }
  #banner.show { display: block; }
  main { flex: 1 1 auto; padding: 20px 24px; }
  .head { display: flex; align-items: center; gap: 14px; margin-bottom: 6px; }
  #appicon { width: 40px; height: 40px; object-fit: contain; display: none; }
  #appicon.show { display: block; }
  #logo { width: 40px; height: 40px; object-fit: contain; display: none; }
  #logo.show { display: block; }
  .titles { display: flex; flex-direction: column; }
  h1 { font-size: 20px; font-weight: 600; margin: 0; line-height: 1.25; }
  .subtitle { font-size: 12px; color: var(--fg-dim); margin-top: 2px; }
  .message { margin: 14px 0; line-height: 1.5; white-space: pre-wrap; }
  .message.left { text-align: left; }
  .message.center { text-align: center; }
  .message.right { text-align: right; }
  .apps {
    border: 1px solid var(--border); border-radius: 6px; overflow: hidden;
    margin: 12px 0; background: var(--card);
  }
  .app { display: flex; align-items: center; gap: 10px; padding: 8px 12px; }
  .app:nth-child(odd) { background: var(--row); }
  .app:nth-child(even) { background: var(--row-alt); }
  .app .name { font-weight: 600; }
  .app .desc { color: var(--fg-dim); }
  .field { margin: 12px 0; }
  input[type=text] {
    width: 100%; padding: 8px 10px; font-size: 14px; color: var(--fg);
    background: var(--card); border: 1px solid var(--btn-secondary-border);
    border-radius: 4px; outline: none;
  }
  input[type=text]:focus { border-color: var(--accent); }
  .list { display: flex; flex-direction: column; gap: 4px; margin: 12px 0; }
  .list label {
    display: flex; align-items: center; gap: 8px; padding: 6px 10px;
    border: 1px solid var(--border); border-radius: 4px; background: var(--card);
    cursor: pointer;
  }
  .defer { display: flex; gap: 24px; font-size: 12px; color: var(--fg-dim); margin: 10px 0; }
  .defer b { color: var(--fg); }
  .countdown {
    margin: 12px 0; font-size: 13px; color: var(--fg-dim);
  }
  .countdown .clock { color: var(--accent); font-weight: 600; font-variant-numeric: tabular-nums; }
  footer {
    display: flex; justify-content: flex-end; gap: 10px;
    padding: 14px 24px; border-top: 1px solid var(--border); background: var(--card);
  }
  button {
    font-family: inherit; font-size: 14px; padding: 8px 18px; border-radius: 4px;
    cursor: pointer; min-width: 96px; border: 1px solid transparent;
  }
  button.primary { background: var(--accent); color: #ffffff; }
  button.primary:hover { filter: brightness(1.08); }
  button.secondary {
    background: var(--btn-secondary-bg); color: var(--btn-secondary-fg);
    border-color: var(--btn-secondary-border);
  }
  button.secondary:hover { filter: brightness(0.97); }
  button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
</style>
</head>
<body>
<div id="app">
  <img id="banner" alt="">
  <main>
    <div class="head">
      <img id="appicon" alt="">
      <img id="logo" alt="">
      <div class="titles">
        <h1 id="title"></h1>
        <div class="subtitle" id="subtitle"></div>
      </div>
    </div>
    <div class="message" id="message"></div>
    <div class="apps" id="apps" style="display:none"></div>
    <div class="field" id="inputField" style="display:none">
      <input type="text" id="inputBox">
    </div>
    <div class="list" id="list" style="display:none"></div>
    <div class="defer" id="defer" style="display:none"></div>
    <div class="countdown" id="countdown" style="display:none"></div>
  </main>
  <footer id="buttons"></footer>
</div>
<script src="dialog.js"></script>
</body>
</html>
